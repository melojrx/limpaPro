<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Anti-FOUC: aplica o tema antes do React montar -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('limpapro-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (stored === 'dark' || (!stored && prefersDark)) {
            document.documentElement.classList.add('dark');
          }
        } catch (_) {}
      })();
    </script>
